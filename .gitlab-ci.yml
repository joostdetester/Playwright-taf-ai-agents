spec:
  inputs:
    Suite:
      default: "bookstore"
      options:
        - bookstore
        - greenkart
        - letsshop
        - petstore
        - custom
      description: "Suite selection (SUT tag). Use 'custom' to run only Custom_tags."
    Custom_tags:
      default: "@all"
      description: "Gherkin tag expression. Default '@all'. Example: '@api and not @wip'."
    Omgeving:
      default: "test"
      options:
        - test
        - acc
        - prod
      description: "Environment (reserved for future use)."
---

image: mcr.microsoft.com/playwright:v1.44.0-jammy

stages:
  - test
  - report

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

variables:
  MCP_ENABLED: "false"
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.npm"

cache:
  key: "npm-${CI_COMMIT_REF_SLUG}"
  paths:
    - .npm/

.default_suite:
  stage: test
  before_script:
    - node --version
    - npm --version
    - npm ci --prefer-offline --no-audit --progress=false
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - allure-results/
      - test-results/
      - playwright-report/

.suite_with_mysql:
  extends: .default_suite
  services:
    - name: mysql:8.0
      alias: mysql
  variables:
    MYSQL_HOST: mysql
    MYSQL_PORT: "3306"
    MYSQL_USER: test
    MYSQL_PASSWORD: test
    MYSQL_DATABASE: rahulshettyacademy
    MYSQL_ROOT_PASSWORD: root
  before_script:
    - node --version
    - npm --version
    - npm ci --prefer-offline --no-audit --progress=false
    # Wait until MySQL port is open
    - |
      for i in $(seq 1 60); do
        (echo > /dev/tcp/mysql/3306) >/dev/null 2>&1 && echo "MySQL is up" && break
        echo "Waiting for MySQL... ($i/60)"; sleep 2
      done

.tagged_suite:
  extends: .suite_with_mysql
  script:
    - |
      SUITE="$[[ inputs.Suite ]]"
      CUSTOM_TAGS="$[[ inputs.Custom_tags ]]"
      OMGEVING="$[[ inputs.Omgeving ]]"

      case "${SUITE}" in
        bookstore|greenkart|letsshop|petstore|custom) ;;
        *) echo "Invalid SUITE='${SUITE}'. Allowed: bookstore|greenkart|letsshop|petstore|custom" >&2; exit 1 ;;
      esac

      case "${OMGEVING}" in
        test|acc|prod) ;;
        *) echo "Invalid OMGEVING='${OMGEVING}'. Allowed: test|acc|prod" >&2; exit 1 ;;
      esac

      if [ -z "${CUSTOM_TAGS}" ]; then
        CUSTOM_TAGS="@all"
      fi

      TAG_EXPR="${CUSTOM_TAGS}"
      if [ "${SUITE}" != "custom" ]; then
        TAG_EXPR="@${SUITE} and ${CUSTOM_TAGS}"
      fi

      # Base URL defaults for non-custom suites.
      if [ "${SUITE}" = "petstore" ]; then
        export BASE_URL="https://petstore.swagger.io"
        export API_BASE_URL="https://petstore.swagger.io/v2"
      elif [ "${SUITE}" != "custom" ]; then
        export BASE_URL="https://rahulshettyacademy.com"
        export API_BASE_URL="https://rahulshettyacademy.com"
      fi

      echo "SUITE=${SUITE}";
      echo "OMGEVING=${OMGEVING}";
      echo "TAG_EXPR=${TAG_EXPR}";

      npx bddgen test --tags "${TAG_EXPR}"

      # Safe mode: if the selected tags generate any letsshop specs, credentials must be present.
      if find ".features-gen/features/letsshop" -type f -name "*.spec.js" -print -quit 2>/dev/null | grep -q .; then
        if [ -z "${TEST_USER_EMAIL:-}" ] || [ -z "${TEST_USER_PASSWORD:-}" ]; then
          echo "Missing GitLab CI/CD variables TEST_USER_EMAIL and/or TEST_USER_PASSWORD (required for generated letsshop UI specs)" >&2
          exit 1
        fi
      fi

      npx playwright test --reporter=list,allure-playwright ".features-gen/features"


suite:
  extends: .tagged_suite

report:allure:
  extends: .default_suite
  stage: report
  needs:
    - job: suite
      artifacts: true
  rules:
    - when: always
  cache:
    key: "report-${CI_COMMIT_REF_SLUG}-$[[ inputs.Suite ]]-$[[ inputs.Omgeving ]]"
    policy: pull-push
    paths:
      - .npm/
      - .allure-history/
  script:
    - node --version
    - npm --version
    - |
      # Allure CLI requires Java. Playwright image typically doesn't include it.
      if command -v java >/dev/null 2>&1; then
        java -version
      else
        echo "Java not found; installing OpenJDK...";
        (sudo apt-get update && sudo apt-get install -y --no-install-recommends openjdk-17-jre-headless) \
          || (apt-get update && apt-get install -y --no-install-recommends openjdk-17-jre-headless)
        java -version
      fi
    - npm ci --prefer-offline --no-audit --progress=false
    - |
      SUITE="$[[ inputs.Suite ]]"
      OMGEVING="$[[ inputs.Omgeving ]]"
      REPORT_TS="$(date -u +%Y%m%d-%H%M%S)"
      REPORT_DIR="allure-report-${REPORT_TS}"

      HISTORY_CACHE_DIR=".allure-history/${SUITE}/${OMGEVING}"
      if [ -d "${HISTORY_CACHE_DIR}" ]; then
        echo "Restoring Allure history from ${HISTORY_CACHE_DIR}";
        mkdir -p allure-results/history
        cp -R "${HISTORY_CACHE_DIR}/"* allure-results/history/ 2>/dev/null || true
      else
        echo "No previous Allure history found for ${SUITE}/${OMGEVING} (first run or cache miss).";
      fi

      echo "Generating Allure report into ${REPORT_DIR}";
      mkdir -p "${REPORT_DIR}"
      if ! npx allure generate allure-results --clean -o "${REPORT_DIR}"; then
        echo "Allure report generation failed; creating placeholder index.html" >&2
        printf '%s\n' \
          '<!doctype html>' \
          '<html lang="en">' \
          '  <head>' \
          '    <meta charset="utf-8" />' \
          '    <meta name="viewport" content="width=device-width,initial-scale=1" />' \
          '    <title>Allure report generation failed</title>' \
          '  </head>' \
          '  <body>' \
          '    <h1>Allure report generation failed</h1>' \
          '    <p>Check the job log for the Allure CLI error output. A Java runtime is required.</p>' \
          '  </body>' \
          '</html>' \
          > "${REPORT_DIR}/index.html"
      fi

      # Persist history for next runs so Allure's History tab shows per-test history.
      mkdir -p "${HISTORY_CACHE_DIR}"
      rm -rf "${HISTORY_CACHE_DIR}"/*
      if [ -d "${REPORT_DIR}/history" ]; then
        cp -R "${REPORT_DIR}/history/"* "${HISTORY_CACHE_DIR}/" 2>/dev/null || true
        echo "Saved Allure history to ${HISTORY_CACHE_DIR}";
      else
        echo "No history directory produced in ${REPORT_DIR} (report generation may have been skipped/failed).";
      fi

      if [ -f "${REPORT_DIR}/index.html" ]; then
        echo "Allure report (artifact link): ${CI_PROJECT_URL}/-/jobs/${CI_JOB_ID}/artifacts/file/${REPORT_DIR}/index.html"
      else
        echo "Allure report index.html not found in ${REPORT_DIR}; artifact link not available." >&2
      fi
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - allure-results/
      - allure-report-*/

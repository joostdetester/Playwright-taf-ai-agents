image: mcr.microsoft.com/playwright:v1.44.0-jammy

stages:
  - test

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

variables:
  MCP_ENABLED: "false"
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.npm"
  # Optional: limit to one SUT. Examples: letsshop | greenkart | bookstore | petstore
  SUT: ""
  # Optional: Gherkin tag expression for generation filtering. Example: "@smoke and not @wip"
  TAGS: ""

cache:
  key: "npm-${CI_COMMIT_REF_SLUG}"
  paths:
    - .npm/

.default_suite:
  stage: test
  before_script:
    - node --version
    - npm --version
    - npm ci --prefer-offline --no-audit --progress=false
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - allure-results/
      - allure-report/
      - test-results/
      - playwright-report/
      - summary-*.json

.suite_with_mysql:
  extends: .default_suite
  services:
    - name: mysql:8.0
      alias: mysql
  variables:
    MYSQL_HOST: mysql
    MYSQL_PORT: "3306"
    MYSQL_USER: root
    MYSQL_PASSWORD: root
    MYSQL_DATABASE: rahulshettyacademy
    MYSQL_ROOT_PASSWORD: root
  before_script:
    - node --version
    - npm --version
    - npm ci --prefer-offline --no-audit --progress=false
    # Wait until MySQL port is open
    - |
      for i in $(seq 1 60); do
        (echo > /dev/tcp/mysql/3306) >/dev/null 2>&1 && echo "MySQL is up" && break
        echo "Waiting for MySQL... ($i/60)"; sleep 2
      done

.tagged_suite:
  extends: .suite_with_mysql
  script:
    - |
      if [ -z "${TAGS:-}" ]; then
        echo "Missing GitLab CI/CD variable TAGS (example: @smoke and not @wip)" >&2
        exit 1
      fi
    - |
      # If SUT is provided, run only that SUT directory; otherwise run all generated suites.
      TARGET_DIR=".features-gen/features"
      if [ -n "${SUT:-}" ]; then
        TARGET_DIR=".features-gen/features/${SUT}"
      fi
      echo "Generating tests with TAGS=${TAGS}";
      npx bddgen test --tags "${TAGS}"
      # Require UI creds unless explicitly running petstore-only.
      if [ "${SUT:-}" != "petstore" ]; then
        if [ -z "${TEST_USER_EMAIL:-}" ] || [ -z "${TEST_USER_PASSWORD:-}" ]; then
          echo "Missing GitLab CI/CD variables TEST_USER_EMAIL and/or TEST_USER_PASSWORD" >&2
          exit 1
        fi
      fi
      npx playwright test --reporter=list,allure-playwright "${TARGET_DIR}"
      node scripts/generate-summary.js --suite=${SUT:-tagged} --out=summary-${SUT:-tagged}.json || true
      npm run allure:generate

tagged:
  extends: .tagged_suite
  rules:
    - if: $TAGS != ""

sut:letsshop:
  extends: .suite_with_mysql
  variables:
    SUT: letsshop
    BASE_URL: https://rahulshettyacademy.com
    API_BASE_URL: https://rahulshettyacademy.com
  script:
    - |
      if [ -z "${TEST_USER_EMAIL:-}" ] || [ -z "${TEST_USER_PASSWORD:-}" ]; then
        echo "Missing GitLab CI/CD variables TEST_USER_EMAIL and/or TEST_USER_PASSWORD" >&2
        exit 1
      fi
    - npm run bdd -- .features-gen/features/${SUT}
    - node scripts/generate-summary.js --suite=${SUT} --out=summary-${SUT}.json || true
    - npm run allure:generate
  rules:
    - if: $TAGS != ""
      when: never
    - if: $SUT == "letsshop"
    - if: $SUT == "" 


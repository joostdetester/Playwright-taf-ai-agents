name: Validate Markdown frontmatter

on:
  workflow_dispatch:

jobs:
  validate-frontmatter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Run frontmatter validator
        run: node ./scripts/validateFrontmatter.js

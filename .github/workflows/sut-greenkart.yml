name: "SUT - greenkart"

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

env:
  SUT: greenkart

jobs:
  run-tests:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: rahulshettyacademy
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12

    env:
      MCP_ENABLED: false
      BASE_URL: https://rahulshettyacademy.com
      API_BASE_URL: https://rahulshettyacademy.com
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      MYSQL_HOST: 127.0.0.1
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      MYSQL_DATABASE: rahulshettyacademy

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ms-playwright
            ~/.cache/playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: |
          npm ci --prefer-offline --no-audit --progress=false
          npx playwright install --with-deps

      - name: Run greenkart suite
        id: tests
        shell: bash
        continue-on-error: true
        run: |
          set +e
          npm run bdd -- .features-gen/features/${SUT}
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Generate summary JSON
        if: always()
        run: |
          node scripts/generate-summary.js --suite=${SUT} --out=summary-${SUT}.json || true

      - name: Generate Allure HTML report
        if: always()
        run: |
          if [ -d "allure-results" ]; then
            npx allure generate allure-results --clean -o allure-report || true
          fi

      - name: Upload Allure HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-html-${{ env.SUT }}
          path: allure-report
          if-no-files-found: ignore

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-${{ env.SUT }}
          path: allure-results
          if-no-files-found: ignore

      - name: Upload summary JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: summary-${{ env.SUT }}
          path: summary-${{ env.SUT }}.json
          if-no-files-found: ignore

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-${{ env.SUT }}
          path: |
            test-results
            playwright-report
          if-no-files-found: ignore

      - name: Fail job if suite failed
        if: always() && steps.tests.outputs.exit_code != '0'
        run: exit 1

  publish-pages:
    runs-on: ubuntu-latest
    needs: run-tests
    if: always()
    concurrency:
      group: gh-pages
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Download Allure HTML artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: allure-html-${{ env.SUT }}
          path: site/allure

      - name: Download summary artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: summary-${{ env.SUT }}
          path: site

      - name: Prepare SUT overview page
        shell: bash
        run: |
          set -e
          mkdir -p site
          if [ -f "site/summary-${SUT}.json" ]; then
            cp "site/summary-${SUT}.json" "site/summary.json"
          else
            echo '{"suite":"greenkart","total":0,"passed":0,"failed":0,"skipped":0,"status":"UNKNOWN"}' > "site/summary.json"
          fi

          cat > site/index.html <<'HTML'
          <!doctype html>
          <html lang="nl">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width,initial-scale=1" />
            <title>SUT status</title>
            <style>
              body{font-family:Arial,Helvetica,sans-serif;padding:24px;max-width:900px;margin:0 auto}
              .grid{display:flex;gap:12px;flex-wrap:wrap}
              .card{border:1px solid #e5e7eb;border-radius:10px;padding:12px;min-width:180px}
              .ok{color:green}
              .bad{color:#d9534f}
              .meta{color:#666;font-size:12px}
              code{background:#f4f4f4;padding:2px 6px;border-radius:6px}
            </style>
          </head>
          <body>
            <h1>SUT: <code id="sut">greenkart</code></h1>
            <p class="meta">Deze pagina toont de laatste CI-run voor deze SUT.</p>
            <div class="grid">
              <div class="card"><div class="meta">Status</div><div id="status">-</div></div>
              <div class="card"><div class="meta">Total</div><div id="total">-</div></div>
              <div class="card"><div class="meta">Passed</div><div id="passed">-</div></div>
              <div class="card"><div class="meta">Failed</div><div id="failed">-</div></div>
            </div>
            <p style="margin-top:16px">
              <a href="./allure/">Open Allure report</a>
            </p>
            <pre class="meta" id="details"></pre>
            <script>
              (async () => {
                try {
                  const res = await fetch('./summary.json', { cache: 'no-store' });
                  if (!res.ok) throw new Error('summary.json not found');
                  const j = await res.json();
                  document.getElementById('sut').textContent = j.suite || 'greenkart';
                  const status = String(j.status || 'UNKNOWN');
                  const statusEl = document.getElementById('status');
                  statusEl.textContent = status;
                  statusEl.className = status === 'PASSED' ? 'ok' : (status === 'FAILED' ? 'bad' : '');
                  document.getElementById('total').textContent = j.total ?? 0;
                  document.getElementById('passed').textContent = j.passed ?? 0;
                  document.getElementById('failed').textContent = j.failed ?? 0;
                  document.getElementById('details').textContent = JSON.stringify({
                    start: j.start, stop: j.stop, durationMs: j.durationMs,
                    skipped: j.skipped,
                    failedTests: (j.failedTests || []).slice(0, 20)
                  }, null, 2);
                } catch (e) {
                  document.getElementById('details').textContent = String(e);
                }
              })();
            </script>
          </body>
          </html>
          HTML

      - name: Publish to GitHub Pages (gh-pages)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./site
          destination_dir: sut/greenkart
          keep_files: true

      - name: Add Pages links to summary
        if: always()
        shell: bash
        run: |
          set -e
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          BASE_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/${REPO_NAME}/sut/${SUT}/"
          echo "## SUT Pages links" >> "$GITHUB_STEP_SUMMARY"
          echo "- Status page: ${BASE_URL}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Allure report: ${BASE_URL}allure/" >> "$GITHUB_STEP_SUMMARY"
          echo "- summary.json: ${BASE_URL}summary.json" >> "$GITHUB_STEP_SUMMARY"

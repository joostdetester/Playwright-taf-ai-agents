name: Mirror to GitLab

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      force:
        description: "Force update GitLab main (use only if GitLab diverged)"
        required: false
        default: "false"

permissions:
  contents: read

env:
  GITLAB_REPO_SSH: git@gitlab.com:joost-de-tester-group/playwright-taf-ai-agents-mirror.git

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure SSH
        shell: bash
        env:
          GITLAB_SSH_PRIVATE_KEY: ${{ secrets.GITLAB_SSH_PRIVATE_KEY }}
          GITLAB_SSH_PRIVATE_KEY_B64: ${{ secrets.GITLAB_SSH_PRIVATE_KEY_B64 }}
        run: |
          set -euo pipefail

          if [ -z "${GITLAB_SSH_PRIVATE_KEY_B64}" ] && [ -z "${GITLAB_SSH_PRIVATE_KEY}" ]; then
            echo "Missing required secret: set either GITLAB_SSH_PRIVATE_KEY_B64 (preferred) or GITLAB_SSH_PRIVATE_KEY" >&2
            exit 1
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          if [ -n "${GITLAB_SSH_PRIVATE_KEY_B64}" ]; then
            # Preferred: single-line secret, avoids newline/clipboard issues.
            echo "${GITLAB_SSH_PRIVATE_KEY_B64}" | tr -d '\r\n' | base64 -d > ~/.ssh/id_ed25519
          else
            # Fallback: raw multiline secret.
            if [[ "${GITLAB_SSH_PRIVATE_KEY}" == ssh-* ]]; then
              echo "Secret GITLAB_SSH_PRIVATE_KEY looks like a PUBLIC key (starts with 'ssh-...')." >&2
              echo "Paste the PRIVATE key instead (starts with '-----BEGIN OPENSSH PRIVATE KEY-----')." >&2
              exit 1
            fi
            if ! printf '%s' "${GITLAB_SSH_PRIVATE_KEY}" | tr -d '\r' | grep -q "BEGIN OPENSSH PRIVATE KEY"; then
              echo "Secret GITLAB_SSH_PRIVATE_KEY does not look like an OpenSSH PRIVATE key." >&2
              echo "It should contain the line: '-----BEGIN OPENSSH PRIVATE KEY-----'." >&2
              exit 1
            fi

            # Write key without mangling newlines; do not print it.
            printf '%s' "${GITLAB_SSH_PRIVATE_KEY}" | tr -d '\r' > ~/.ssh/id_ed25519
          fi
          chmod 600 ~/.ssh/id_ed25519

          # Validate key parses (common failure: pasted public key or truncated private key)
          if ! ssh-keygen -y -f ~/.ssh/id_ed25519 >/dev/null 2>&1; then
            echo "Invalid SSH private key in secret GITLAB_SSH_PRIVATE_KEY." >&2
            echo "Expected an OpenSSH private key that starts with '-----BEGIN OPENSSH PRIVATE KEY-----'." >&2
            echo "If you pasted a public key (starts with 'ssh-ed25519'), copy the PRIVATE key instead." >&2
            exit 1
          fi

          ssh-keyscan -t rsa,ed25519 gitlab.com >> ~/.ssh/known_hosts

      - name: Add GitLab remote
        shell: bash
        run: |
          set -e
          git remote remove gitlab 2>/dev/null || true
          git remote add gitlab "${GITLAB_REPO_SSH}"

      - name: Push main + tags to GitLab
        shell: bash
        run: |
          set -e
          if [ "${{ github.event.inputs.force }}" = "true" ]; then
            git push gitlab HEAD:main --force
            git push gitlab --tags --force
          else
            git push gitlab HEAD:main
            git push gitlab --tags
          fi

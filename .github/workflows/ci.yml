name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: |
          npm ci
          npx playwright install --with-deps
      - name: Run Playwright BDD tests
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          MCP_ENABLED: false
        run: |
          npx playwright test tests/bdd --reporter=list,allure-playwright || true
      - name: Generate Allure
        run: |
          npx allure generate allure-results --clean -o allure-report || true
      - name: Upload Allure artifact
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

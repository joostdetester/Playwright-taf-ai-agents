name: CI

on:
  workflow_dispatch:  
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: rahulshettyacademy
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          npm ci
          npx playwright install --with-deps
      - name: Run Playwright BDD dummy suite
        env:
          BASE_URL: https://rahulshettyacademy.com
          API_BASE_URL: https://rahulshettyacademy.com
          MCP_ENABLED: false
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
          MYSQL_USER: root
          MYSQL_PASSWORD: root
          MYSQL_DATABASE: rahulshettyacademy
        run: |
          npm run bdd:dummy
      # Example: to enable MCP servers and inject secrets from GitHub Secrets,
      # uncomment and adjust the following env mapping. Keep MCP disabled by
      # default to avoid running local-only agents in CI.
      # - name: Run with MCP (example)
      #   env:
      #     BASE_URL: https://rahulshettyacademy.com
      #     API_BASE_URL: https://rahulshettyacademy.com
      #     MCP_ENABLED: true
      #     GITHUB_PERSONAL_ACCESS_TOKEN: ${{ secrets.GITHUB_PERSONAL_ACCESS_TOKEN }}
      #     REST_BASE_URL: ${{ secrets.REST_BASE_URL }}
      #     MYSQL_HOST: ${{ secrets.MYSQL_HOST }}
      #     MYSQL_PORT: ${{ secrets.MYSQL_PORT }}
      #     MYSQL_USER: ${{ secrets.MYSQL_USER }}
      #     MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
      #     MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
      #   run: |
      #     npm ci
      #     npm run mcp:filesystem & npm run mcp:playwright
      #     npm run bdd
      - name: Generate Allure report
        if: always()
        run: |
          npm run allure:generate
      - name: Upload Allure report
        if: always()
        id: upload-allure
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          if-no-files-found: warn
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            allure-results
            test-results
            playwright-report
      - name: Add report links to summary
        if: always()
        run: |
          echo "## Test report links" >> $GITHUB_STEP_SUMMARY
          echo "- [Artifacts for this run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts)" >> $GITHUB_STEP_SUMMARY
          echo "- Allure artifact: **allure-report**" >> $GITHUB_STEP_SUMMARY
          echo "::notice title=Allure report::Open run artifacts: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts (artifact name: allure-report)"

  deploy-allure:
    if: always() && github.ref == 'refs/heads/main' && github.event.repository.private == false
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download Allure report artifact
        uses: actions/download-artifact@v4
        with:
          name: allure-report
          path: allure-report
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      - name: Add live report link to summary
        run: |
          echo "## Allure live report" >> $GITHUB_STEP_SUMMARY
          echo "- [Open Allure report](${{ steps.deployment.outputs.page_url }})" >> $GITHUB_STEP_SUMMARY

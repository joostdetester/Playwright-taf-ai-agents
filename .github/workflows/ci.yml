name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: rahulshettyacademy
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          npm ci
          npx playwright install --with-deps
      - name: Run Playwright BDD dummy suite
        env:
          BASE_URL: https://rahulshettyacademy.com
          API_BASE_URL: https://rahulshettyacademy.com
          MCP_ENABLED: false
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: root
          DB_NAME: rahulshettyacademy
        run: |
          npm run bdd:dummy
      - name: Generate Allure report
        if: always()
        run: |
          npm run allure:generate
      - name: Upload Allure report
        if: always()
        id: upload-allure
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          if-no-files-found: warn
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            allure-results
            test-results
            playwright-report
      - name: Add report links to summary
        if: always()
        run: |
          echo "## Test report links" >> $GITHUB_STEP_SUMMARY
          echo "- [Artifacts for this run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts)" >> $GITHUB_STEP_SUMMARY
          echo "- Allure artifact: **allure-report**" >> $GITHUB_STEP_SUMMARY
          echo "::notice title=Allure report::Open run artifacts: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts (artifact name: allure-report)"

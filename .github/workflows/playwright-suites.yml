name: Playwright Suites

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  
permissions:
  contents: write
  pages: write

jobs:
  run-suite:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - suite: petstore
            tag: '@petstore'
          - suite: api
            tag: '@api'
          - suite: e2e
            tag: '@e2e'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ms-playwright
            ~/.cache/playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies (fast)
        run: |
          npm ci --prefer-offline --no-audit --progress=false
          # Only install Playwright browsers if not cached
          if [ ! -d "~/.cache/ms-playwright" ] && [ ! -d "$HOME/.cache/ms-playwright" ]; then
            npx playwright install --with-deps
          fi

      - name: Run tests for suite
        run: |
          echo "Running suite=${{ matrix.suite }} tag=${{ matrix.tag }}"
          # Generate BDD tests and run Playwright with the requested tag
          npm run bdd -- --grep="${{ matrix.tag }}" || true

      - name: Generate summary JSON
        run: |
          node scripts/generate-summary.js --suite=${{ matrix.suite }} --out=summary-${{ matrix.suite }}.json || true

      - name: Install Allure CLI
        run: |
          npm install -g allure-commandline@2.13.0 || true

      - name: Generate Allure HTML report (if results present)
        run: |
          if [ -d "allure-results" ]; then
            npx allure generate allure-results -o allure-report || true
          else
            echo "no allure-results dir"
          fi

      - name: Upload Allure HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-html-${{ matrix.suite }}
          path: allure-report

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        with:
          name: allure-${{ matrix.suite }}
          path: allure-results

      - name: Upload summary
        uses: actions/upload-artifact@v4
        with:
          name: summary-${{ matrix.suite }}
          path: summary-${{ matrix.suite }}.json

  publish-dashboard:
    name: Publish dashboard to GitHub Pages
    needs: run-suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all summary artifacts (robust)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Listing artifacts for run $GITHUB_RUN_ID"
          mkdir -p artifacts
          API_URL="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/artifacts"
          echo "Querying $API_URL"
          artifacts_json=$(curl -s -H "Authorization: token ${GITHUB_TOKEN}" "$API_URL")
          echo "$artifacts_json" > artifacts/list.json
          ids=$(echo "$artifacts_json" | jq -r '.artifacts[] | select(.name | test("^(summary-|allure-html-)")) | "\(.id):\(.name)"') || true
          if [ -z "$ids" ]; then
            echo "No summary-* artifacts found"
          else
            echo "$ids" | while IFS= read -r line; do
              id=$(echo "$line" | cut -d: -f1)
              name=$(echo "$line" | cut -d: -f2)
              echo "Downloading artifact id=$id name=$name"
              curl -s -L -H "Authorization: token ${GITHUB_TOKEN}" "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${id}/zip" -o "/tmp/${name}.zip"
              unzip -o "/tmp/${name}.zip" -d "artifacts/${name}" || true
              # If this is an allure-html artifact, move its contents into a folder we can serve
              if echo "$name" | grep -q "allure-html-"; then
                mkdir -p "artifacts/${name}/_html"
                mv "artifacts/${name}"/* "artifacts/${name}/_html" 2>/dev/null || true
              fi
            done
          fi

      - name: Prepare and merge site for timestamped run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TS=$(date -u +"%Y-%m-%dT%H-%M-%SZ")
          echo "Run timestamp: $TS"
          mkdir -p deploy

          # If gh-pages exists, fetch its contents so we preserve prior runs
          if git ls-remote --exit-code --heads origin gh-pages; then
            echo "Cloning existing gh-pages branch"
            git clone --depth 1 --branch gh-pages "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" ghpages || true
            cp -R ghpages/* deploy/ || true
          else
            echo "No gh-pages branch yet; starting fresh"
          fi

          # Create a timestamped folder for this run
          RUN_DIR=deploy/${TS}
          mkdir -p "${RUN_DIR}"

          # Copy dashboard and current summaries into run folder
          cp -R dashboard/* "${RUN_DIR}/" || true
          if [ -d artifacts ]; then
            # copy any summary-*.json files
            find artifacts -maxdepth 2 -type f -name 'summary-*.json' -exec cp {} "${RUN_DIR}/" \; || true
          fi

          # Generate a simple index listing all runs (directories)
          echo "<html><head><meta charset=\"utf-8\"><title>Test Runs</title></head><body><h1>Test Runs</h1><ul>" > deploy/index.html
          for d in $(ls -1 deploy | grep -E '^[0-9]{4}-' | sort -r); do
            if [ -d "deploy/$d" ]; then
              echo "<li><a href=\"./$d/\">$d</a></li>" >> deploy/index.html
            fi
          done
          echo "</ul></body></html>" >> deploy/index.html

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy

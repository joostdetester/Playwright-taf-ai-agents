name: Playwright Suites

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      tag:
        description: "Run tests containing this tag (e.g. @e2e)"
        required: true
        default: "@e2e"
      target_env:
        description: "Target environment (future use)"
        type: choice
        required: true
        default: "test"
        options:
          - test
          - acc
          - prod
  
permissions:
  contents: write

jobs:
  validate-frontmatter:
    name: Validate Markdown frontmatter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Run frontmatter validator
        run: node ./scripts/validateFrontmatter.js

  run-suite:
    runs-on: ubuntu-latest
    needs: validate-frontmatter
    env:
      TAG: ${{ inputs.tag || vars.SCHEDULE_TAG || '@e2e' }}
      TARGET_ENV: ${{ inputs.target_env || vars.TARGET_ENV || 'test' }}
    steps:
      - uses: actions/checkout@v4

      - name: Normalize run parameters
        shell: bash
        run: |
          set -e
          clean_tag=$(echo "${TAG}" | xargs)
          clean_env=$(echo "${TARGET_ENV}" | xargs)

          echo "TAG=${clean_tag}" >> "$GITHUB_ENV"
          echo "TARGET_ENV=${clean_env}" >> "$GITHUB_ENV"

          echo "Normalized TAG='${clean_tag}'"
          echo "Normalized TARGET_ENV='${clean_env}'"

      - name: Resolve suite name (for artifacts)
        id: meta
        shell: bash
        run: |
          set -e
          # Create a safe suite name from the tag so we can name artifacts/files
          suite=$(echo "${TAG}" | sed 's/^@//' | tr -cs '[:alnum:]._-' '-' | tr '[:upper:]' '[:lower:]')
          suite=$(echo "${suite}" | sed 's/^-*//' | sed 's/-*$//')
          suite=${suite:-tagged}
          echo "suite=${suite}" >> "$GITHUB_OUTPUT"
          echo "Resolved suite=${suite} from TAG=${TAG}"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/ms-playwright
            ~/.cache/playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies (fast)
        run: |
          npm ci --prefer-offline --no-audit --progress=false
          # Only install Playwright browsers if not cached
          if [ ! -d "~/.cache/ms-playwright" ] && [ ! -d "$HOME/.cache/ms-playwright" ]; then
            npx playwright install --with-deps
          fi

      - name: Run tests for suite
        run: |
          echo "Running TAG=${TAG} TARGET_ENV=${TARGET_ENV}"
          # Generate BDD tests and run Playwright with the requested tag
          npm run bdd -- --grep="${TAG}" || true

      - name: Generate summary JSON
        run: |
          node scripts/generate-summary.js --suite=${{ steps.meta.outputs.suite }} --out=summary-${{ steps.meta.outputs.suite }}.json || true

      - name: Install Allure CLI
        run: |
          npm install -g allure-commandline@2.13.0 || true

      - name: Generate Allure HTML report (if results present)
        run: |
          if [ -d "allure-results" ]; then
            npx allure generate allure-results -o allure-report || true
          else
            echo "no allure-results dir"
          fi

      - name: Upload Allure HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-html-${{ steps.meta.outputs.suite }}
          path: allure-report
          if-no-files-found: ignore

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        with:
          name: allure-${{ steps.meta.outputs.suite }}
          path: allure-results
          if-no-files-found: ignore

      - name: Upload summary
        uses: actions/upload-artifact@v4
        with:
          name: summary-${{ steps.meta.outputs.suite }}
          path: summary-${{ steps.meta.outputs.suite }}.json
          if-no-files-found: ignore

  publish-dashboard:
    name: Publish dashboard to GitHub Pages
    needs: run-suite
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.runmeta.outputs.run_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute run timestamp + URLs
        id: runmeta
        shell: bash
        run: |
          set -e
          TS=$(date -u +"%Y-%m-%dT%H-%M-%SZ")
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          BASE_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/${REPO_NAME}/"
          RUN_URL="${BASE_URL}${TS}/"

          echo "ts=${TS}" >> "$GITHUB_OUTPUT"
          echo "base_url=${BASE_URL}" >> "$GITHUB_OUTPUT"
          echo "run_url=${RUN_URL}" >> "$GITHUB_OUTPUT"

          echo "Run timestamp: ${TS}"
          echo "Base URL: ${BASE_URL}"
          echo "Run URL: ${RUN_URL}"

      - name: Download summary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: summary-*
          path: artifacts

      - name: Download Allure HTML artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: allure-html-*
          path: artifacts

      - name: Prepare and merge site for timestamped run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TS="${{ steps.runmeta.outputs.ts }}"
          BASE_URL="${{ steps.runmeta.outputs.base_url }}"
          RUN_URL="${{ steps.runmeta.outputs.run_url }}"

          echo "Run timestamp: $TS"
          # persist timestamp so later steps can reference it
          echo "$TS" > run_timestamp.txt
          mkdir -p deploy

          # If gh-pages exists, fetch its contents so we preserve prior runs
          if git ls-remote --exit-code --heads origin gh-pages; then
            echo "Cloning existing gh-pages branch"
            git clone --depth 1 --branch gh-pages "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" ghpages || true
            cp -R ghpages/* deploy/ || true
          else
            echo "No gh-pages branch yet; starting fresh"
          fi

          # Create a timestamped folder for this run
          RUN_DIR=deploy/${TS}
          mkdir -p "${RUN_DIR}"

          # Copy current summaries into run folder
          if [ -d artifacts ]; then
            # copy any summary-*.json files
            find artifacts -maxdepth 2 -type f -name 'summary-*.json' -exec cp {} "${RUN_DIR}/" \; || true

            # copy Allure HTML reports into a stable, timestamped path
            # artifacts are downloaded as artifacts/allure-html-<suite>/...
            if ls artifacts/allure-html-* >/dev/null 2>&1; then
              mkdir -p "${RUN_DIR}/allure"
              for d in artifacts/allure-html-*; do
                [ -d "$d" ] || continue
                suite=$(basename "$d" | sed 's/^allure-html-//')
                mkdir -p "${RUN_DIR}/allure/${suite}"
                cp -R "$d"/* "${RUN_DIR}/allure/${suite}/" || true
              done
            else
              echo "No allure-html-* artifacts found"
            fi
          fi

          # Create a simple per-run landing page that links to detailed reports
          echo "<html><head><meta charset=\"utf-8\"><title>Test Run ${TS}</title></head><body>" > "${RUN_DIR}/index.html"
          echo "<h1>Test Run: ${TS}</h1>" >> "${RUN_DIR}/index.html"
          echo "<p><a href=\"../\">Back to runs index</a></p>" >> "${RUN_DIR}/index.html"

          echo "<h2>Reports</h2><ul>" >> "${RUN_DIR}/index.html"
          if [ -d "${RUN_DIR}/allure" ]; then
            for d in "${RUN_DIR}/allure"/*; do
              [ -d "$d" ] || continue
              suite=$(basename "$d")
              echo "<li>${suite}: <a href=\"./allure/${suite}/\">Allure report</a></li>" >> "${RUN_DIR}/index.html"
            done
          else
            echo "<li>(No Allure HTML reports)</li>" >> "${RUN_DIR}/index.html"
          fi

          # Summary JSONs (used for quick totals / integrations)
          if ls "${RUN_DIR}"/summary-*.json >/dev/null 2>&1; then
            for f in "${RUN_DIR}"/summary-*.json; do
              b=$(basename "$f")
              echo "<li><a href=\"./${b}\">${b}</a></li>" >> "${RUN_DIR}/index.html"
            done
          fi
          echo "</ul></body></html>" >> "${RUN_DIR}/index.html"

          # Generate a simple index listing all runs (directories)
          echo "<html><head><meta charset=\"utf-8\"><title>Test Runs</title></head><body><h1>Test Runs</h1><ul>" > deploy/index.html
          for d in $(ls -1 deploy | grep -E '^[0-9]{4}-' | sort -r); do
            if [ -d "deploy/$d" ]; then
              echo "<li><a href=\"./$d/\">$d</a></li>" >> deploy/index.html
            fi
          done
          echo "</ul></body></html>" >> deploy/index.html

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./deploy

      - name: Add run link to workflow summary
        run: |
          TS="${{ steps.runmeta.outputs.ts }}"
          BASE_URL="${{ steps.runmeta.outputs.base_url }}"
          RUN_URL="${{ steps.runmeta.outputs.run_url }}"

          echo "### Deployed run" >> "$GITHUB_STEP_SUMMARY"
          echo "- [Open latest run](${RUN_URL})" >> "$GITHUB_STEP_SUMMARY"
          echo "- [Open runs index](${BASE_URL})" >> "$GITHUB_STEP_SUMMARY"

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Detailed reports" >> "$GITHUB_STEP_SUMMARY"

          # Suite-level Allure HTML reports
          if [ -d "deploy/${TS}/allure" ]; then
            found=0
            for p in deploy/${TS}/allure/*; do
              [ -d "$p" ] || continue
              suite=$(basename "$p")
              found=1
              echo "- ${suite}: [Allure report](${RUN_URL}allure/${suite}/)" >> "$GITHUB_STEP_SUMMARY"
            done
            if [ "$found" -eq 0 ]; then
              echo "- (no Allure HTML reports found)" >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "- (no Allure HTML reports found)" >> "$GITHUB_STEP_SUMMARY"
          fi

          # Summary JSONs for quick totals/integrations
          if ls "deploy/${TS}"/summary-*.json >/dev/null 2>&1; then
            for f in deploy/${TS}/summary-*.json; do
              b=$(basename "$f")
              echo "- [${b}](${RUN_URL}${b})" >> "$GITHUB_STEP_SUMMARY"
            done
          fi

          # also print as plain log for quick access
          echo "Run URL: ${RUN_URL}"

      - name: Add tag/env info to workflow summary
        run: |
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Run parameters" >> "$GITHUB_STEP_SUMMARY"
          echo "- TAG: ${{ inputs.tag || vars.SCHEDULE_TAG || '@e2e' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- TARGET_ENV: ${{ inputs.target_env || vars.TARGET_ENV || 'test' }}" >> "$GITHUB_STEP_SUMMARY"

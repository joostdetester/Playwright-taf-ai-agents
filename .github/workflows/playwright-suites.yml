name: Playwright Suites

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  
permissions:
  contents: write
  pages: write

jobs:
  run-suite:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - suite: petstore
            tag: '@petstore'
          - suite: api
            tag: '@api'
          - suite: e2e
            tag: '@e2e'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Run tests for suite
        run: |
          echo "Running suite=${{ matrix.suite }} tag=${{ matrix.tag }}"
          npx playwright test --grep "${{ matrix.tag }}" --reporter=list,allure-playwright || true

      - name: Generate summary JSON
        run: |
          node scripts/generate-summary.js --suite=${{ matrix.suite }} --out=summary-${{ matrix.suite }}.json || true

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        with:
          name: allure-${{ matrix.suite }}
          path: allure-results

      - name: Upload summary
        uses: actions/upload-artifact@v4
        with:
          name: summary-${{ matrix.suite }}
          path: summary-${{ matrix.suite }}.json

  publish-dashboard:
    name: Publish dashboard to GitHub Pages
    needs: run-suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all summary artifacts (robust)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Listing artifacts for run $GITHUB_RUN_ID"
          mkdir -p artifacts
          API_URL="https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/artifacts"
          echo "Querying $API_URL"
          artifacts_json=$(curl -s -H "Authorization: token ${GITHUB_TOKEN}" "$API_URL")
          echo "$artifacts_json" > artifacts/list.json
          ids=$(echo "$artifacts_json" | jq -r '.artifacts[] | select(.name | test("^summary-")) | "\(.id):\(.name)"') || true
          if [ -z "$ids" ]; then
            echo "No summary-* artifacts found"
          else
            echo "$ids" | while IFS= read -r line; do
              id=$(echo "$line" | cut -d: -f1)
              name=$(echo "$line" | cut -d: -f2)
              echo "Downloading artifact id=$id name=$name"
              curl -s -L -H "Authorization: token ${GITHUB_TOKEN}" "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/${id}/zip" -o "/tmp/${name}.zip"
              unzip -o "/tmp/${name}.zip" -d "artifacts/${name}" || true
            done
          fi

      - name: Prepare site folder
        run: |
          mkdir -p site
          mkdir -p site/data
          if [ -d artifacts/summary-petstore ]; then cp artifacts/summary-petstore/* site/; fi
          if [ -d artifacts/summary-api ]; then cp artifacts/summary-api/* site/; fi
          if [ -d artifacts/summary-e2e ]; then cp artifacts/summary-e2e/* site/; fi
          cp -R dashboard/* site/ || true

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
